<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pali Ghat Hatchling Viewer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
}

#container{
display:flex;
height:100vh;
}

#sidebar{
width:320px;
padding:10px;
overflow:auto;
background:#f5f5f5;
border-right:1px solid #ccc;
}

#map{
flex:1;
}

select{
width:100%;
padding:8px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:left;
}

th{
background:#eee;
}

@media(max-width:768px){

#container{
flex-direction:column;
}

#sidebar{
width:100%;
height:40vh;
border-right:none;
border-bottom:1px solid #ccc;
}

#map{
height:60vh;
}

}

</style>
</head>

<body>

<div id="container">

<div id="sidebar">

<h3>Pali Ghat Hatchlings</h3>

<select id="idSelector">
<option value="">Select Hatchling ID</option>
</select>

<div id="tableContainer"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

let dataset=[];
let trackLayer=null;

const map=L.map('map',{closePopupOnClick:false}).setView([25.85,76.60],11);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
attribution:'Esri'
}).addTo(map);

function csvToArray(str){

const rows=str.trim().split("\n");
const headers=rows.shift().split(",");

return rows.map(r=>{
const vals=r.split(",");
let obj={};
headers.forEach((h,i)=>obj[h.trim().toLowerCase()]=vals[i]);
return obj;
});

}

function getLatestPoints(data){

const latest={};

data.forEach(row=>{

const id=row.id;
const time=new Date(row.datetime);

if(!latest[id]||new Date(latest[id].datetime)<time){
latest[id]=row;
}

});

return Object.values(latest);

}

function buildTable(points){

let html="<table>";
html+="<tr><th>Date</th><th>Lat</th><th>Lon</th><th>Location</th></tr>";

points.forEach(p=>{

html+=`
<tr>
<td>${p.datetime}</td>
<td>${p.latitude}</td>
<td>${p.longitude}</td>
<td>${p.location}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;

}

function drawTrack(id){

if(trackLayer) map.removeLayer(trackLayer);

const points=dataset.filter(d=>d.id==id);

const latlngs=points.map(p=>[
parseFloat(p.latitude),
parseFloat(p.longitude)
]);

trackLayer=L.polyline(latlngs,{color:"red",weight:3}).addTo(map);

map.fitBounds(trackLayer.getBounds());

buildTable(points);

}

fetch(sheetURL)
.then(r=>r.text())
.then(csv=>{

dataset=csvToArray(csv);

const ids=[...new Set(dataset.map(d=>d.id))];

ids.forEach(id=>{

const opt=document.createElement("option");
opt.value=id;
opt.text="ID "+id;

document.getElementById("idSelector").appendChild(opt);

});

const latestPoints=getLatestPoints(dataset);

latestPoints.forEach(point=>{

const marker=L.marker([
parseFloat(point.latitude),
parseFloat(point.longitude)
]).addTo(map);

marker.bindPopup(`
<b>ID ${point.id}</b><br>
${point.datetime}<br>
${point.location}
`);

marker.on("click",function(){

if(marker.isPopupOpen()){
marker.closePopup();
}else{
marker.openPopup();
}

});

});

});

document.getElementById("idSelector")
.addEventListener("change",function(){

const id=this.value;

if(id){
drawTrack(id);
}

});

</script>

</body>
</html>
